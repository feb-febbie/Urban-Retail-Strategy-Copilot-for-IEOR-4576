steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/urban-retail-copilot'
      - '.'

  # ── Step 2: Push to Container Registry ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/urban-retail-copilot'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'urban-retail-copilot'
      - '--image=gcr.io/$PROJECT_ID/urban-retail-copilot'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      # Memory: sentence-transformers + geopandas need headroom
      - '--memory=4Gi'
      # CPU: allocate 2 vCPUs during request processing
      - '--cpu=2'
      # Timeout: the full analysis pipeline can take 2–3 min
      - '--timeout=600'
      # Keep one instance warm so the grader doesn't hit a cold start
      - '--min-instances=1'
      # ── LLM key: use ONE of the options below ──────────────────────────────
      #
      # Option A (recommended): No key needed — Gemini runs via ADC.
      # Just grant the Cloud Run service account "Vertex AI User" role:
      #   gcloud projects add-iam-policy-binding $PROJECT_ID \
      #     --member="serviceAccount:$(gcloud iam service-accounts list --format='value(email)' | head -1)" \
      #     --role="roles/aiplatform.user"
      #
      # Option B: Inject your Anthropic key from Secret Manager:
      # - '--set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      #
      # Option C: Inject a Google AI Studio key (free tier):
      # - '--set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest'
      #
      # Optional: NYC Open Data token
      # - '--set-secrets=NYC_OPEN_DATA_APP_TOKEN=NYC_OPEN_DATA_APP_TOKEN:latest'

images:
  - 'gcr.io/$PROJECT_ID/urban-retail-copilot'
